<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus DFS | Client Node</title>
    <link rel="icon" type="image/jpeg" href="/nexus.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=JetBrains+Mono&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #05060f;
            --panel-bg: rgba(30, 31, 46, 0.6);
            --accent-cyan: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.4);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border-glass: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg);
            background-image:
                radial-gradient(circle at 0% 0%, rgba(0, 242, 255, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(157, 80, 187, 0.03) 0%, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .client-app {
            width: 100%;
            max-width: 900px;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 32px;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: appScale 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        header h1 {
            font-size: 2.25rem;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #fff, var(--accent-cyan));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-dim);
            font-size: 1.1rem;
        }

        .upload-zone {
            border: 2px dashed var(--border-glass);
            border-radius: 24px;
            padding: 4rem 2rem;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            background: rgba(255, 255, 255, 0.01);
            margin-bottom: 3rem;
        }

        .upload-zone:hover {
            border-color: var(--accent-cyan);
            background: rgba(0, 242, 255, 0.02);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.1);
        }

        .upload-zone.dragover {
            border-color: var(--accent-cyan);
            background: rgba(0, 242, 255, 0.05);
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
        }

        .upload-text {
            font-size: 1.25rem;
            font-weight: 400;
            color: var(--text-main);
        }

        .upload-hint {
            color: var(--text-dim);
            margin-top: 0.5rem;
        }

        #file-input {
            display: none;
        }

        .files-section {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            padding: 1.5rem;
        }

        .section-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-dim);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .file-list {
            list-style: none;
        }

        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            margin-bottom: 0.75rem;
            transition: transform 0.2s ease;
        }

        .file-item:hover {
            transform: translateX(5px);
            background: rgba(255, 255, 255, 0.05);
        }

        .file-name {
            font-weight: 500;
            font-family: 'JetBrains Mono', monospace;
        }

        .btn-download {
            background: rgba(0, 242, 255, 0.1);
            color: var(--accent-cyan);
            border: 1px solid var(--accent-cyan);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.2s ease;
            margin-left: 0.5rem;
        }

        .btn-download:hover {
            background: var(--accent-cyan);
            color: var(--bg);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .btn-delete {
            background: rgba(255, 75, 92, 0.1);
            color: #ff4b5c;
            border: 1px solid #ff4b5c;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.2s ease;
            margin-left: 0.5rem;
        }

        .btn-delete:hover {
            background: #ff4b5c;
            color: var(--bg);
            box-shadow: 0 0 15px rgba(255, 75, 92, 0.4);
        }

        .btn-wipe {
            background: rgba(255, 75, 92, 0.1);
            color: #ff4b5c;
            border: 1px solid #ff4b5c;
            padding: 0.3rem 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .btn-wipe:hover {
            background: #ff4b5c;
            color: var(--bg);
        }

        /* Progress Bar */
        .progress-container {
            margin-bottom: 1.5rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 1.25rem;
            border: 1px solid var(--border-glass);
            position: relative;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-cyan), #9d50bb);
            width: 0%;
            transition: width 0.1s ease;
        }

        .progress-text {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.7rem;
            color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace;
        }

        .status-toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1rem 2rem;
            border-radius: 12px;
            background: #1a1b1e;
            border: 1px solid var(--border-glass);
            transform: translateY(100px);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 100;
        }

        .status-toast.show {
            transform: translateY(0);
        }

        @keyframes appScale {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>

<body>
    <div class="client-app">
        <header>
            <img src="/nexus.jpg" alt="Nexus Logo"
                style="width: 80px; height: 80px; margin-bottom: 1rem; border-radius: 16px; box-shadow: 0 0 20px var(--accent-glow);">
            <h1>Nexus Client</h1>
            <p>Distributed File System Control Center</p>
        </header>

        <div class="upload-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
            <span class="upload-icon">🚀</span>
            <div class="upload-text">Drop files here to Nexus DFS</div>
            <div class="upload-hint">or click to browse your local drives</div>
            <input type="file" id="file-input" multiple>
        </div>

        <div id="progress-wrapper"></div>

        <div class="files-section">
            <div class="section-title">
                <span>Network Storage</span>
                <div>
                    <span id="file-count" class="status-badge">0 Files</span>
                    <button class="btn-wipe" onclick="wipeCluster()" style="margin-left: 10px;">WIPE CLUSTER</button>
                </div>
            </div>
            <ul id="file-list" class="file-list">
                <!-- List initialized here -->
            </ul>
        </div>
    </div>

    <div id="toast" class="status-toast"></div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const fileList = document.getElementById('file-list');
        const toast = document.getElementById('toast');

        function showToast(msg) {
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Drag and drop handlers
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(evt => {
            dropZone.addEventListener(evt, e => {
                e.preventDefault();
                e.stopPropagation();
            }, false);
        });

        dropZone.addEventListener('dragover', () => dropZone.classList.add('dragover'));
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            dropZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

        async function handleFiles(files) {
            for (let file of files) {
                uploadFile(file);
            }
        }

        function uploadFile(file) {
            const formData = new FormData();
            formData.append('file', file);

            const xhr = new XMLHttpRequest();
            const progressWrapper = document.getElementById('progress-wrapper');

            const container = document.createElement('div');
            container.className = 'progress-container';
            container.style.display = 'block';
            container.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                    <div style="font-size: 0.75rem; color: var(--text-dim); font-family: 'JetBrains Mono';">${file.name}</div>
                    <div class="pct-text" style="font-size: 0.75rem; color: var(--accent-cyan); font-family: 'JetBrains Mono';">0%</div>
                </div>
                <div class="progress-bar-bg" style="background: rgba(255,255,255,0.03); border-radius: 8px; height: 8px; overflow: hidden; border: 1px solid var(--border-glass); position: relative;">
                    <div class="progress-bar" style="height: 100%; background: linear-gradient(90deg, var(--accent-cyan), #9d50bb); width: 0%; transition: width 0.1s ease;"></div>
                </div>
            `;
            progressWrapper.appendChild(container);

            const progressBar = container.querySelector('.progress-bar');
            const pctText = container.querySelector('.pct-text');
            showToast(`Uploading ${file.name}...`);

            xhr.upload.addEventListener('progress', (e) => {
                if (e.lengthComputable) {
                    const percent = Math.round((e.loaded / e.total) * 100);
                    progressBar.style.width = percent + '%';
                    pctText.innerText = percent + '%';
                }
            });

            xhr.onreadystatechange = () => {
                if (xhr.readyState === 4) {
                    setTimeout(() => {
                        container.remove();
                    }, 2000);
                    if (xhr.status === 200) {
                        showToast(`Upload successful: ${file.name}`, 'success');
                        refreshFiles();
                    } else {
                        showToast(`Upload failed: ${file.name}`, 'error');
                    }
                }
            };

            xhr.open('POST', '/api/upload', true);
            xhr.send(formData);
        }

        async function refreshFiles() {
            try {
                const response = await fetch('/api/files');
                const rawData = await response.json();

                // Our hack: Master returns filenames in the 'ip' field when requested with empty string
                const fileNames = (rawData && rawData.locations) ? rawData.locations.map(l => l.ip) : [];

                fileList.innerHTML = '';
                document.getElementById('file-count').innerText = `${fileNames.length} Files`;

                fileNames.forEach(name => {
                    if (!name) return;
                    const li = document.createElement('li');
                    li.className = 'file-item';
                    li.innerHTML = `
                        <div class="file-name">${name}</div>
                        <div class="actions">
                            <button class="btn-download" onclick="downloadFile('${name}')">DOWNLOAD</button>
                            <button class="btn-delete" onclick="deleteFile('${name}')">DELETE</button>
                        </div>
                    `;
                    fileList.appendChild(li);
                });
            } catch (err) {
                console.error("Failed to load files", err);
            }
        }

        async function downloadFile(name) {
            showToast(`Downloading ${name}...`);
            window.location.href = `/api/download?name=${encodeURIComponent(name)}`;
        }

        async function deleteFile(name) {
            if (!confirm(`Delete ${name} from all replicas?`)) return;
            try {
                const response = await fetch(`/api/delete?name=${encodeURIComponent(name)}`);
                if (response.ok) {
                    showToast('File deleted successfully', 'success');
                    refreshFiles();
                }
            } catch (err) {
                showToast('Delete failed', 'error');
            }
        }

        async function wipeCluster() {
            if (!confirm("Are you sure you want to WIPE the entire cluster? This clears the Master registry.")) return;
            try {
                const response = await fetch('/api/delete_all');
                if (response.ok) {
                    showToast('Cluster Wiped!', 'success');
                    refreshFiles();
                }
            } catch (err) {
                showToast('Wipe failed', 'error');
            }
        }

        // Initial load and poll
        refreshFiles();
        setInterval(refreshFiles, 5000);

    </script>
</body>

</html>
