syntax = "proto3";

package dfs;

option go_package = "dfs-go/proto;proto";

service MasterTracker {
  // Data Keeper -> Master Tracker: heartbeat to signal liveness.
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);

  // Client -> Master Tracker: request a data keeper to receive an upload.
  rpc RequestUpload(UploadRequest) returns (UploadResponse);

  // Client -> Master Tracker: wait for the data keeper to confirm storage.
  rpc WaitForUpload(WaitForUploadRequest) returns (WaitForUploadResponse);

  // Client -> Master Tracker: request locations to download a file from.
  rpc RequestDownload(DownloadRequest) returns (DownloadResponse);

  // Client -> Master Tracker: list all known files.
  rpc ListFiles(ListFilesRequest) returns (ListFilesResponse);

  // Data Keeper -> Master Tracker: notify that a file was stored locally.
  rpc NotifyUpload(NotifyUploadRequest) returns (NotifyUploadResponse);

  // Data Keeper -> Master Tracker: report local files on startup.
  rpc ReportFiles(ReportFilesRequest) returns (ReportFilesResponse);

  // Optional extension: delete a file across the cluster.
  rpc DeleteFile(DeleteFileRequest) returns (DeleteFileResponse);

  // Optional extension: wipe all files across the cluster.
  rpc DeleteAllFiles(DeleteAllRequest) returns (DeleteAllResponse);
}

service DataKeeper {
  // Master Tracker -> Data Keeper: instruct a source keeper to copy a file.
  rpc Replicate(ReplicateRequest) returns (ReplicateResponse);

  // Optional extension: delete a local file.
  rpc DeleteFile(DeleteFileRequest) returns (DeleteFileResponse);

  // Optional extension: wipe local storage.
  rpc Wipe(WipeRequest) returns (WipeResponse);
}

message WipeRequest {}

message WipeResponse {
  bool success = 1;
}

message HeartbeatRequest {
  string node_id = 1;
  string ip = 2;
  int32 port = 3; // TCP port for file transfers.
}

message HeartbeatResponse {
  bool success = 1;
}

message UploadRequest {
  string file_name = 1;
  int64 file_size = 2;
}

message UploadResponse {
  string upload_id = 1;
  string node_ip = 2;
  int32 node_port = 3; // TCP port to connect to.
}

message WaitForUploadRequest {
  string upload_id = 1;
}

message WaitForUploadResponse {
  bool success = 1;
  string message = 2;
}

message DownloadRequest {
  string file_name = 1;
}

message DownloadResponse {
  repeated NodeLocation locations = 1;
  int64 file_size = 2;
}

message ListFilesRequest {}

message FileSummary {
  string file_name = 1;
  int64 file_size = 2;
  int32 alive_replicas = 3;
  bool fully_replicated = 4;
}

message ListFilesResponse {
  repeated FileSummary files = 1;
}

message NodeLocation {
  string ip = 1;
  int32 port = 2;
}

message NotifyUploadRequest {
  string upload_id = 1;
  string file_name = 2;
  string node_id = 3;
  string file_path = 4;
  int64 file_size = 5;
}

message NotifyUploadResponse {
  bool success = 1;
}

message ReplicateRequest {
  string file_name = 1;
  string source_ip = 2;
  int32 source_port = 3;
  string destination_ip = 4;
  int32 destination_port = 5;
}

message ReplicateResponse {
  bool success = 1;
}

message ReportFilesRequest {
  string node_id = 1;
  repeated FileInfo files = 2;
}

message FileInfo {
  string file_name = 1;
  int64 file_size = 2;
  string file_path = 3;
}

message ReportFilesResponse {
  bool success = 1;
}

message DeleteFileRequest {
  string file_name = 1;
}

message DeleteFileResponse {
  bool success = 1;
}

message DeleteAllRequest {}

message DeleteAllResponse {
  bool success = 1;
}
