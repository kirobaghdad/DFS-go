syntax = "proto3";

package dfs;

option go_package = "./proto";

service MasterTracker {
  // Data Keeper -> Master Tracker: Heartbeat to signal liveness
  rpc Heartbeat (HeartbeatRequest) returns (HeartbeatResponse);
  
  // Client -> Master Tracker: Request to upload a file
  rpc RequestUpload (UploadRequest) returns (UploadResponse);
  
  // Client -> Master Tracker: Request to download a file
  rpc RequestDownload (DownloadRequest) returns (DownloadResponse);
  
  // Data Keeper -> Master Tracker: Notify that a file has been successfully uploaded/copied
  rpc NotifyUpload (NotifyUploadRequest) returns (NotifyUploadResponse);

  // Data Keeper -> Master Tracker: List all local files on startup/sync
  rpc ReportFiles (ReportFilesRequest) returns (ReportFilesResponse);

  // Client -> Master Tracker: Request to delete a file
  rpc DeleteFile (DeleteFileRequest) returns (DeleteFileResponse);

  // Client -> Master Tracker: Request to delete all files
  rpc DeleteAllFiles (DeleteAllRequest) returns (DeleteAllResponse);
}

service DataKeeper {
  // Master Tracker -> Data Keeper: Instruct to replicate a file to another node
  rpc Replicate (ReplicateRequest) returns (ReplicateResponse);

  // Master Tracker -> Data Keeper: Instruct to delete a local file
  rpc DeleteFile (DeleteFileRequest) returns (DeleteFileResponse);

  // Master Tracker -> Data Keeper: Instruct to wipe all local storage
  rpc Wipe (WipeRequest) returns (WipeResponse);
}

message WipeRequest {}
message WipeResponse {
  bool success = 1;
}

message HeartbeatRequest {
  string node_id = 1;
  string ip = 2;
  int32 port = 3; // TCP port for file transfers
}

message HeartbeatResponse {
  bool success = 1;
}

message UploadRequest {
  string file_name = 1;
  int64 file_size = 2;
}

message UploadResponse {
  string node_ip = 1;
  int32 node_port = 2; // TCP port to connect to
}

message DownloadRequest {
  string file_name = 1;
}

message DownloadResponse {
  repeated NodeLocation locations = 1;
  int64 file_size = 2;
}

message NodeLocation {
  string ip = 1;
  int32 port = 2;
}

message NotifyUploadRequest {
  string file_name = 1;
  string node_id = 2;
  string file_path = 3;
  int64 file_size = 4;
}

message NotifyUploadResponse {
  bool success = 1;
}

message ReplicateRequest {
  string file_name = 1;
  string source_ip = 2;
  int32 source_port = 3;
  string destination_ip = 4;
  int32 destination_port = 5;
}

message ReplicateResponse {
  bool success = 1;
}

message ReportFilesRequest {
  string node_id = 1;
  repeated FileInfo files = 2;
}

message FileInfo {
  string file_name = 1;
  int64 file_size = 2;
  string file_path = 3;
}

message ReportFilesResponse {
  bool success = 1;
}

message DeleteFileRequest {
  string file_name = 1;
}

message DeleteFileResponse {
  bool success = 1;
}

message DeleteAllRequest {
}

message DeleteAllResponse {
  bool success = 1;
}
