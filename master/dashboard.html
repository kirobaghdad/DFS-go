<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus DFS | Dashboard</title>
    <link rel="icon" type="image/jpeg" href="/nexus.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=JetBrains+Mono&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0a0b1e;
            --panel-bg: rgba(25, 27, 50, 0.7);
            --accent-blue: #00d2ff;
            --accent-purple: #9d50bb;
            --text-primary: #e0e0e0;
            --text-secondary: #94a3b8;
            --status-alive: #00ff9d;
            --status-down: #ff4b5c;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg);
            background-image:
                radial-gradient(circle at 20% 30%, rgba(0, 210, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(157, 80, 187, 0.05) 0%, transparent 40%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 2rem;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 2rem;
            animation: fadeInUp 1s ease-out;
        }

        .panel {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .panel:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 210, 255, 0.3);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 1rem;
        }

        .panel-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--accent-blue);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .node-list,
        .file-list {
            list-style: none;
        }

        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            margin-bottom: 0.75rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            transition: background 0.2s ease;
        }

        .item:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .node-info .name {
            font-weight: 600;
        }

        .node-info .addr {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 0.2rem;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 0.5rem;
        }

        .status--alive {
            background: var(--status-alive);
            box-shadow: 0 0 10px var(--status-alive);
        }

        .status--down {
            background: var(--status-down);
            box-shadow: 0 0 10px var(--status-down);
        }

        .file-info .name {
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
        }

        .file-info .replicas {
            font-size: 0.9rem;
            color: var(--accent-purple);
        }

        .activity-feed {
            grid-column: 1 / -1;
            max-height: 300px;
            overflow-y: auto;
        }

        .activity-feed .item {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            border-left: 2px solid var(--accent-blue);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 210, 255, 0.3);
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div style="display: flex; align-items: center;">
                <img src="/nexus.jpg" alt="Nexus Logo"
                    style="width: 60px; height: 60px; margin-right: 1.5rem; border-radius: 12px; box-shadow: 0 0 15px var(--accent-blue);">
                <h1>NEXUS <span style="font-weight: 300;">DFS</span></h1>
            </div>
            <div id="last-update" style="color: var(--text-secondary); font-size: 0.9rem;">Syncing...</div>
        </header>

        <div class="dashboard-grid">
            <!-- Server Nodes Panel -->
            <div class="panel">
                <div class="panel-header">
                    <span class="panel-title">Server Nodes</span>
                    <span id="node-count" class="status-badge"
                        style="background: rgba(0, 210, 255, 0.1); color: var(--accent-blue);">0 Total</span>
                </div>
                <ul id="node-list" class="node-list">
                    <!-- Nodes injected here -->
                </ul>
            </div>

            <!-- Storage Map Panel -->
            <div class="panel">
                <div class="panel-header">
                    <span class="panel-title">Storage Map</span>
                    <span id="file-count" class="status-badge"
                        style="background: rgba(157, 80, 187, 0.1); color: var(--accent-purple);">0 Files</span>
                </div>
                <ul id="file-list" class="file-list">
                    <!-- Files injected here -->
                </ul>
            </div>

            <!-- Activity Feed -->
            <div class="panel activity-feed">
                <div class="panel-header">
                    <span class="panel-title">Live Activity Feed</span>
                </div>
                <div id="activity-log">
                    <!-- Logs injected here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        async function updateDashboard() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();

                // Update Nodes
                const nodeList = document.getElementById('node-list');
                nodeList.innerHTML = '';
                let aliveCount = 0;
                Object.values(data.nodes).forEach(node => {
                    if (node.is_alive) aliveCount++;
                    const li = document.createElement('li');
                    li.className = 'item';
                    li.innerHTML = `
                        <div class="node-info">
                            <div class="name">${node.node_id}</div>
                            <div class="addr">${node.ip}:${node.port}</div>
                        </div>
                        <div>
                            <span class="status-dot status--${node.is_alive ? 'alive' : 'down'}"></span>
                            <span style="color: ${node.is_alive ? 'var(--status-alive)' : 'var(--status-down)'}">${node.is_alive ? 'ALIVE' : 'DOWN'}</span>
                        </div>
                    `;
                    nodeList.appendChild(li);
                });
                document.getElementById('node-count').innerText = `${aliveCount} / ${Object.keys(data.nodes).length} Alive`;

                // Update Files
                const fileList = document.getElementById('file-list');
                fileList.innerHTML = '';
                const fileMap = {};
                data.files.forEach(f => {
                    if (!fileMap[f.file_name]) fileMap[f.file_name] = [];
                    fileMap[f.file_name].push(f.node_id);
                });

                Object.entries(fileMap).forEach(([name, holders]) => {
                    const li = document.createElement('li');
                    li.className = 'item';
                    li.innerHTML = `
                        <div class="file-info">
                            <div class="name">${name}</div>
                            <div class="replicas">Holders: ${holders.join(', ')}</div>
                        </div>
                        <div class="status-badge" style="background: ${holders.length >= 3 ? 'rgba(0, 255, 157, 0.1)' : 'rgba(255, 75, 92, 0.1)'}; color: ${holders.length >= 3 ? 'var(--status-alive)' : 'var(--status-down)'}">
                            ${holders.length} Replicas
                        </div>
                    `;
                    fileList.appendChild(li);
                });
                document.getElementById('file-count').innerText = `${Object.keys(fileMap).length} Files`;

                // Update activity count/timestamp
                document.getElementById('last-update').innerText = `Last Refreshed: ${new Date().toLocaleTimeString()}`;

            } catch (err) {
                console.error('Failed to fetch status:', err);
                document.getElementById('last-update').innerText = 'Connection Lost';
            }
        }

        // Poll every 2 seconds
        setInterval(updateDashboard, 2000);
        updateDashboard();

        // Simple mock activity for visual flair
        function addActivity(msg) {
            const log = document.getElementById('activity-log');
            const div = document.createElement('div');
            div.className = 'item';
            div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            log.prepend(div);
            if (log.children.length > 10) log.lastChild.remove();
        }

        addActivity("Nexus Dashboard initialized.");
        addActivity("Monitoring Data Keepers heartbeats...");
    </script>
</body>

</html>
